<!DOCTYPE html>
<html>
<head>
<title>AI DevOps Log Analyzer</title>
<style>
body { font-family: Arial; margin: 40px; }
textarea { width: 100%; height: 120px; }
button { margin-top: 10px; padding: 8px 16px; }
#result { margin-top: 20px; background:#f4f4f4; padding:15px; }
</style>
</head>

<body>

<h2>AI DevOps Log Analyzer</h2>

<textarea id="logInput" placeholder="Paste log here"></textarea>

<br>

<button onclick="analyzeLog()">Analyze Log</button>

<div id="result"></div>

<script>
async function analyzeLog() {

const logText = document.getElementById("logInput").value;

const response = await fetch("http://localhost:8000/analyze", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({ log: logText })
});

const data = await response.json();

document.getElementById("result").innerHTML =
"<b>Root Cause:</b> " + data.root_cause +
"<br><b>Suggestion:</b> " + data.suggestion;
}
</script>

</body>
</html>
